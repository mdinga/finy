{% load static %}
<header class="border-bottom bg-white">
  <div class="container-fluid py-3 d-flex justify-content-between align-items-center">
    <h1 class="h5 m-0">Finy</h1>

    <div class="d-flex gap-2 align-items-center">
      <button id="btnShowToday" class="btn btn-plain btn-sm">Today</button>
      <button id="btnShowUpcoming" class="btn btn-plain btn-sm">Upcoming</button>

      <div class="dropdown">
        <button class="btn btn-plain btn-sm dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Quick create
        </button>

        <div class="dropdown-menu dropdown-menu-end p-3" style="width:360px;">
          <div class="small fw-semibold mb-2">Create</div>

          <div class="mb-3">
            <label for="qcFolderName" class="form-label">Folder name</label>
            <input id="qcFolderName" class="form-control form-control-sm" placeholder="e.g. Projects">
            <label for="qcFolderDesc" class="form-label mt-2">Description</label>
            <input id="qcFolderDesc" class="form-control form-control-sm" placeholder="Short description">
            <div class="hint mt-1">Tip: A short clear purpose helps future you file tasks faster.</div>
            <div class="d-flex justify-content-end mt-2">
              <button class="btn btn-plain btn-sm" onclick="createFolder('qcFolderName','qcFolderDesc')">Save folder</button>
            </div>
          </div>

          <hr class="my-2">

          <div>
            <label for="qcSpaceName" class="form-label">Space name</label>
            <input id="qcSpaceName" class="form-control form-control-sm" placeholder="e.g. Finance">
            <label for="qcSpaceCategory" class="form-label mt-2">Category</label>
            <select id="qcSpaceCategory" class="form-select form-select-sm"></select>
            <div class="hint mt-1">Hint: Categories keep spaces tidy and filterable.</div>
            <div class="d-flex justify-content-end mt-2">
              <button class="btn btn-plain btn-sm" onclick="createSpace('qcSpaceName','qcSpaceCategory')">Save space</button>
            </div>
            <div id="quickCreateError" class="text-danger small d-none mt-1"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
